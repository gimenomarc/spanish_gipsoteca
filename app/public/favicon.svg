<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Fondo negro -->
  <rect width="512" height="512" fill="#0a0a0a"/>

  <!-- Marco fino dorado -->
  <rect x="18" y="18" width="476" height="476" stroke="#d0b06a" stroke-width="3" fill="none"/>

  <!-- Columna clásica dórica en dorado -->

  <!-- Ábaco: placa superior plana -->
  <rect x="134" y="106" width="244" height="22" fill="#d0b06a"/>

  <!-- Équino: capital troncocónico (más ancho arriba) -->
